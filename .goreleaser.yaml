version: 2
project_name: tabura

builds:
  - id: tabura
    main: ./cmd/tabura
    binary: tabura
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .ShortCommit }}

archives:
  - id: tabura
    ids:
      - tabura
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "tabura_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - scripts/piper_tts_server.py
      - scripts/setup-local-llm.sh
      - services/intent-classifier/main.py
      - services/intent-classifier/intents.json

checksum:
  name_template: checksums.txt

release:
  github:
    owner: krystophny
    name: tabura
  extra_files:
    - glob: ./scripts/install.sh
      name_template: install.sh
    - glob: ./scripts/install.ps1
      name_template: install.ps1
  draft: false
  prerelease: auto

changelog:
  use: github-native

brews:
  - repository:
      owner: krystophny
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/krystophny/tabura
    description: Local-first voice assistant with canvas UI
    license: MIT
    install: |
      bin.install "tabura"
    caveats: |
      Run `tabura server` or use the full installer:
        curl -fsSL https://github.com/krystophny/tabura/releases/latest/download/install.sh | bash
      Requires codex app-server and Python 3.10+ for Piper TTS.
