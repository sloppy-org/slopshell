name: tabura_circle_multi_select_tool_and_session
description: Keep the circle open while changing both the active tool and the active session.
tags:
  - circle
  - multi
preconditions:
  tool: pointer
  session: none
  silent: false
steps:
  - action: tap
    target: tabura_circle_dot
    expect:
      tabura_circle: expanded
  - action: tap
    target: tabura_circle_segment_ink
    expect:
      active_tool: ink
      session: none
      silent: false
      tabura_circle: expanded
  - action: tap
    target: tabura_circle_segment_dialogue
    expect:
      active_tool: ink
      session: dialogue
      silent: false
      indicator_state: listening
      tabura_circle: expanded
  - action: tap_outside
    expect:
      active_tool: ink
      session: dialogue
      silent: false
      indicator_state: listening
      tabura_circle: collapsed
      dot_inner_icon: pen_nib
