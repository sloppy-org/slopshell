name: tabura_circle_combined_states
description: Cover every tool, session, and silent-mode combination through the flow system.
tags:
  - circle
  - matrix
preconditions:
  tool: pointer
  session: none
  silent: false
steps:
  - action: verify
    expect:
      active_tool: pointer
      session: none
      silent: false
  - action: tap
    target: tabura_circle_dot
    expect:
      tabura_circle: expanded
  - action: tap
    target: tabura_circle_segment_highlight
    expect:
      active_tool: highlight
      session: none
      silent: false
  - action: tap
    target: tabura_circle_segment_ink
    expect:
      active_tool: ink
      session: none
      silent: false
  - action: tap
    target: tabura_circle_segment_text_note
    expect:
      active_tool: text_note
      session: none
      silent: false
  - action: tap
    target: tabura_circle_segment_prompt
    expect:
      active_tool: prompt
      session: none
      silent: false
  - action: tap
    target: tabura_circle_segment_pointer
    expect:
      active_tool: pointer
      session: none
      silent: false
  - action: tap
    target: tabura_circle_segment_silent
    expect:
      active_tool: pointer
      session: none
      silent: true
  - action: tap
    target: tabura_circle_segment_highlight
