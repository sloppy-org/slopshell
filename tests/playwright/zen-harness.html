<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabura Zen Harness</title>
  <link rel="stylesheet" href="../../internal/web/static/style.css">
  <style>
    body { margin: 0; padding: 0; }
  </style>
</head>
<body>
  <div id="app">
    <div id="view-main" class="view">

      <div id="workspace">
        <aside id="pr-file-pane" aria-label="Pull request files">
          <div class="pr-file-pane-head">
            <span id="pr-file-pane-title">Files</span>
            <button id="pr-file-pane-close" type="button" class="edge-btn">Close</button>
          </div>
          <div id="pr-file-list" class="pr-file-list"></div>
        </aside>
        <div id="canvas-column">
          <button id="pr-file-drawer-toggle" type="button" aria-label="Open pull request file list">Files</button>
          <div id="pr-file-drawer-backdrop" aria-hidden="true"></div>
          <div id="canvas-viewport">
            <section id="canvas-text" class="canvas-pane" aria-label="Text artifact"></section>
            <section id="canvas-image" class="canvas-pane" aria-label="Image artifact"><img id="canvas-img" alt="artifact"></section>
            <section id="canvas-pdf" class="canvas-pane" aria-label="PDF artifact"></section>
          </div>
        </div>
      </div>

      <div id="zen-indicator" class="zen-indicator" style="display:none">
        <span class="zen-record-dot"></span>
        <span class="zen-play-icon"></span>
      </div>

      <textarea id="zen-input" class="zen-input" style="display:none" rows="1" placeholder=""></textarea>

      <div id="zen-overlay" class="zen-overlay" style="display:none">
        <div class="zen-overlay-content"></div>
      </div>

      <button id="edge-left-tap" type="button" class="edge-left-tap" aria-label="Tabula Rasa"></button>
      <button id="edge-right-tap" type="button" class="edge-right-tap" aria-label="Open chat panel"></button>

      <div id="edge-top" class="edge-panel edge-top">
        <div class="edge-panel-inner">
          <div class="edge-panel-head">
            <span class="edge-panel-title">Projects</span>
            <button id="btn-edge-rasa" type="button" class="edge-btn">Tabula Rasa</button>
          </div>
          <div id="edge-top-models" aria-label="Project chat model"></div>
          <div id="edge-top-projects"></div>
        </div>
      </div>

      <div id="edge-right" class="edge-panel edge-right">
        <div class="edge-panel-inner">
          <div class="edge-panel-head">
            <span class="edge-panel-title">Log</span>
            <span id="zen-status" class="zen-status"></span>
          </div>
          <div id="chat-history" aria-live="polite"></div>
          <div class="chat-pane-input-row">
            <textarea id="chat-pane-input" rows="1" placeholder="Message..."></textarea>
          </div>
        </div>
      </div>

      <div id="toolbar" style="display:none">
        <div id="project-tab-strip" role="tablist" aria-label="Projects"></div>
        <span id="status-text">ready</span>
        <span id="chat-mode-pill" class="badge">chat</span>
      </div>
      <section id="project-overview" class="project-overview is-hidden" style="display:none">
        <div id="project-cards" class="project-cards"></div>
        <form id="project-create-form" autocomplete="off" style="display:none"></form>
      </section>

    </div>
  </div>

  <script>
    // Harness log for test assertions
    window.__harnessLog = [];
    const DEFAULT_CANCEL_RESPONSE = { ok: true, canceled: 3, active_canceled: 1, queued_canceled: 1, delegate_canceled: 1 };
    let cancelResponsesQueue = [];
    let activityResponse = { ok: true, active_turns: 0, queued_turns: 0, delegate_active: 0 };
    let messagePostDelayMs = 0;
    window.__setCancelResponses = (responses) => {
      cancelResponsesQueue = Array.isArray(responses) ? responses.map((entry) => ({ ...entry })) : [];
    };
    window.__setActivityResponse = (response) => {
      activityResponse = {
        ok: true,
        active_turns: Number(response?.active_turns || 0),
        queued_turns: Number(response?.queued_turns || 0),
        delegate_active: Number(response?.delegate_active || 0),
      };
    };
    window.__setMessagePostDelay = (ms) => {
      const n = Number(ms);
      messagePostDelayMs = Number.isFinite(n) && n > 0 ? Math.floor(n) : 0;
    };
    window.__setCancelResponses([]);
    window.__setActivityResponse({ active_turns: 0, queued_turns: 0, delegate_active: 0 });
    window.__setMessagePostDelay(0);

    const harnessProjects = [
      {
        id: 'test',
        name: 'Test',
        kind: 'managed',
        project_key: '/tmp/test',
        root_path: '/tmp',
        chat_session_id: 'chat-1',
        canvas_session_id: 'local',
        chat_mode: 'chat',
        chat_model: 'spark',
        chat_model_reasoning_effort: 'low',
      },
      {
        id: 'hub',
        name: 'Hub',
        kind: 'hub',
        project_key: '__hub__',
        root_path: '/tmp/hub',
        chat_session_id: 'chat-hub',
        canvas_session_id: 'local',
        chat_mode: 'chat',
        chat_model: 'spark',
        chat_model_reasoning_effort: 'low',
      },
    ];
    let activeProjectId = 'test';
    const cloneProject = (id) => {
      const project = harnessProjects.find((item) => item.id === id) || harnessProjects[0];
      return { ...project };
    };

    // Mock fetch for /api/setup etc.
    const _realFetch = window.fetch;
    window.fetch = async function(url, opts) {
      const u = String(url);
      if (u.includes('/api/setup')) {
        return new Response(JSON.stringify({
          has_password: true,
          authenticated: true,
          local_session: 'local',
        }), { status: 200 });
      }
      if (u.includes('/api/projects') && u.includes('/activate')) {
        const activateId = decodeURIComponent(u.split('/api/projects/')[1].split('/activate')[0] || '').trim();
        const project = cloneProject(activateId);
        activeProjectId = project.id;
        window.__harnessLog.push({
          type: 'api_fetch',
          action: 'project_activate',
          method: opts?.method || 'POST',
          url: u,
          payload: { project_id: project.id },
        });
        return new Response(JSON.stringify({
          project,
        }), { status: 200 });
      }
      if (u.includes('/api/projects') && u.includes('/chat-model') && opts?.method === 'POST') {
        const projectId = decodeURIComponent(u.split('/api/projects/')[1].split('/chat-model')[0] || '').trim();
        const index = harnessProjects.findIndex((project) => project.id === projectId);
        if (index < 0) {
          return new Response('project not found', { status: 404 });
        }
        let body = {};
        try {
          body = JSON.parse(String(opts?.body || '{}'));
        } catch (_) {
          body = {};
        }
        const model = String(body?.model || harnessProjects[index].chat_model || 'spark').trim().toLowerCase();
        const effort = String(body?.reasoning_effort || harnessProjects[index].chat_model_reasoning_effort || 'low').trim().toLowerCase();
        harnessProjects[index] = {
          ...harnessProjects[index],
          chat_model: model || harnessProjects[index].chat_model,
          chat_model_reasoning_effort: effort || harnessProjects[index].chat_model_reasoning_effort,
        };
        window.__harnessLog.push({
          type: 'api_fetch',
          action: 'project_chat_model',
          method: opts?.method || 'POST',
          url: u,
          payload: { project_id: projectId, model, reasoning_effort: effort },
        });
        return new Response(JSON.stringify({
          project: { ...harnessProjects[index] },
        }), { status: 200 });
      }
      if (u.includes('/api/projects')) {
        const projects = harnessProjects.map((project) => ({ ...project }));
        return new Response(JSON.stringify({
          projects,
          default_project_id: 'test',
          active_project_id: activeProjectId,
        }), { status: 200 });
      }
      if (u.includes('/api/chat/sessions') && u.includes('/cancel-delegates')) {
        window.__harnessLog.push({
          type: 'api_fetch',
          action: 'cancel-delegates',
          method: opts?.method || 'GET',
          url: u,
          payload: { ok: true, canceled: 0 },
        });
        return new Response(JSON.stringify({ ok: true, canceled: 0 }), { status: 200 });
      }
      if (u.includes('/api/chat/sessions') && u.includes('/cancel') && !u.includes('/cancel-delegates')) {
        const response = cancelResponsesQueue.length > 0
          ? { ...DEFAULT_CANCEL_RESPONSE, ...cancelResponsesQueue.shift() }
          : { ...DEFAULT_CANCEL_RESPONSE };
        window.__harnessLog.push({
          type: 'api_fetch',
          action: 'cancel',
          method: opts?.method || 'GET',
          url: u,
          payload: response,
        });
        return new Response(JSON.stringify(response), { status: 200 });
      }
      if (u.includes('/api/chat/sessions') && u.includes('/activity')) {
        window.__harnessLog.push({
          type: 'api_fetch',
          action: 'activity',
          method: opts?.method || 'GET',
          url: u,
          payload: activityResponse,
        });
        return new Response(JSON.stringify(activityResponse), { status: 200 });
      }
      if (u.includes('/api/chat/') && u.includes('/messages') && opts?.method === 'POST') {
        const signal = opts?.signal;
        if (messagePostDelayMs > 0) {
          await new Promise((resolve, reject) => {
            const timer = window.setTimeout(() => {
              if (signal && typeof signal.removeEventListener === 'function') {
                signal.removeEventListener('abort', onAbort);
              }
              resolve();
            }, messagePostDelayMs);
            const onAbort = () => {
              window.clearTimeout(timer);
              if (signal && typeof signal.removeEventListener === 'function') {
                signal.removeEventListener('abort', onAbort);
              }
              reject(new DOMException('aborted', 'AbortError'));
            };
            if (signal && typeof signal.addEventListener === 'function') {
              signal.addEventListener('abort', onAbort, { once: true });
            }
          });
        }
        if (signal && signal.aborted) {
          throw new DOMException('aborted', 'AbortError');
        }
        try {
          const body = JSON.parse(opts.body);
          window.__harnessLog.push({ type: 'message_sent', text: body.text });
        } catch (_) {}
        return new Response(JSON.stringify({ ok: true }), { status: 200 });
      }
      if (u.includes('/api/chat/')) {
        return new Response(JSON.stringify({ messages: [], turns: [] }), { status: 200 });
      }
      if (u.includes('/api/assistant/')) {
        return new Response(JSON.stringify({ active: 0, queued: 0 }), { status: 200 });
      }
      if (u.includes('/api/runtime')) {
        return new Response(JSON.stringify({ dev_mode: false, boot_id: 'test', tts_enabled: true }), { status: 200 });
      }
      if (u.includes('/api/canvas/')) {
        return new Response(JSON.stringify({}), { status: 200 });
      }
      return _realFetch.apply(this, arguments);
    };

    // Mock WebSocket with STT message handling and chat events
    const _NativeWebSocket = window.WebSocket;
    class MockWebSocket {
      static CONNECTING = 0;
      static OPEN = 1;
      static CLOSING = 2;
      static CLOSED = 3;
      constructor(url) {
        this.url = url;
        this.readyState = MockWebSocket.OPEN;
        this.binaryType = 'blob';
        this.onopen = null;
        this.onmessage = null;
        this.onclose = null;
        // Track all WS instances for test injection
        if (!window.__mockWsSessions) window.__mockWsSessions = [];
        window.__mockWsSessions.push(this);
        setTimeout(() => { if (this.onopen) this.onopen({}); }, 10);
      }
      send(data) {
        if (data instanceof ArrayBuffer || data instanceof Blob) {
          window.__harnessLog.push({ type: 'stt', action: 'append' });
          return;
        }
        try {
          const msg = JSON.parse(String(data));
          if (msg.type === 'stt_start') {
            window.__harnessLog.push({ type: 'stt', action: 'start', mime_type: msg.mime_type });
          } else if (msg.type === 'stt_stop') {
            window.__harnessLog.push({ type: 'stt', action: 'stop' });
            const ws = this;
            setTimeout(() => {
              if (ws.onmessage) {
                ws.onmessage({ data: JSON.stringify({ type: 'stt_result', text: 'hello world' }) });
              }
            }, 5);
          } else if (msg.type === 'stt_cancel') {
            window.__harnessLog.push({ type: 'stt', action: 'cancel' });
          } else if (msg.type === 'tts_speak') {
            window.__harnessLog.push({ type: 'tts', text: msg.text, lang: msg.lang });
            const ws = this;
            // Return minimal WAV as binary ArrayBuffer
            const wavHeader = new Uint8Array([
              0x52,0x49,0x46,0x46, 0x24,0x00,0x00,0x00, 0x57,0x41,0x56,0x45,
              0x66,0x6D,0x74,0x20, 0x10,0x00,0x00,0x00, 0x01,0x00,0x01,0x00,
              0x44,0xAC,0x00,0x00, 0x88,0x58,0x01,0x00, 0x02,0x00,0x10,0x00,
              0x64,0x61,0x74,0x61, 0x00,0x00,0x00,0x00,
            ]);
            setTimeout(() => {
              if (ws.onmessage) {
                ws.onmessage({ data: wavHeader.buffer });
              }
            }, 5);
          }
        } catch (_) {}
      }
      close() { this.readyState = MockWebSocket.CLOSED; }
      // Helper: inject a chat event from tests
      injectEvent(payload) {
        if (this.onmessage) {
          this.onmessage({ data: JSON.stringify(payload) });
        }
      }
    }
    window.WebSocket = MockWebSocket;

    // Mock AudioContext for TTS playback and VAD analyser input.
    function fillTimeDomainForDb(target, db) {
      if (!(target instanceof Uint8Array)) return;
      const clampedDb = Number.isFinite(db) ? db : -20;
      if (clampedDb <= -95) {
        target.fill(128);
        return;
      }
      const amplitude = Math.max(1, Math.min(127, Math.round(128 * Math.pow(10, clampedDb / 20))));
      for (let i = 0; i < target.length; i += 1) {
        target[i] = (i % 2 === 0) ? 128 + amplitude : 128 - amplitude;
      }
    }
    window.__setVadDbFrames = (frames) => {
      window.__vadDbFrames = Array.isArray(frames) ? frames.slice() : [];
    };
    window.__setVadDbFrames([]);

    const MockAudioContext = class {
      constructor() {
        this.currentTime = 0;
        this.destination = {};
        this.state = 'running';
      }
      async resume() {
        this.state = 'running';
      }
      async decodeAudioData(buf) {
        return { duration: 0.1, length: 4410, sampleRate: 44100, numberOfChannels: 1 };
      }
      createMediaStreamSource() {
        return {
          connect() {},
          disconnect() {},
        };
      }
      createAnalyser() {
        return {
          fftSize: 1024,
          smoothingTimeConstant: 0,
          frequencyBinCount: 512,
          connect() {},
          disconnect() {},
          getByteTimeDomainData(target) {
            const script = Array.isArray(window.__vadDbFrames) ? window.__vadDbFrames : [];
            const nextDb = script.length > 0 ? Number(script.shift()) : -20;
            fillTimeDomainForDb(target, nextDb);
          },
        };
      }
      createBufferSource() {
        const node = {
          buffer: null,
          onended: null,
          connect() {},
          start() {
            setTimeout(() => { if (node.onended) node.onended(); }, 10);
          },
          stop() {},
        };
        return node;
      }
    };
    window.AudioContext = MockAudioContext;
    window.webkitAudioContext = MockAudioContext;

    // Mock getUserMedia
    const fakeTrack = {
      stop() {},
      kind: 'audio',
      enabled: true,
      readyState: 'live',
    };
    const fakeStream = {
      getTracks() { return [fakeTrack]; },
      getAudioTracks() { return [fakeTrack]; },
    };
    if (!navigator.mediaDevices) {
      navigator.mediaDevices = {};
    }
    navigator.mediaDevices.getUserMedia = async () => fakeStream;

    // Mock MediaRecorder
    window.MediaRecorder = class MockMediaRecorder {
      constructor() {
        this.state = 'inactive';
        this.mimeType = 'audio/webm;codecs=opus';
        this._handlers = {};
        this._chunkTimer = null;
      }
      static isTypeSupported() { return true; }
      addEventListener(type, fn, opts) {
        if (!this._handlers[type]) this._handlers[type] = [];
        this._handlers[type].push({ fn, once: !!(opts && opts.once) });
      }
      removeEventListener(type, fn) {
        if (!this._handlers[type]) return;
        this._handlers[type] = this._handlers[type].filter(h => h.fn !== fn);
      }
      _emit(type, ev) {
        const list = (this._handlers[type] || []).slice();
        const keep = [];
        for (const h of list) {
          h.fn(ev);
          if (!h.once) keep.push(h);
        }
        this._handlers[type] = keep;
      }
      start(timeslice) {
        this.state = 'recording';
        this._timeslice = timeslice;
        window.__harnessLog.push({ type: 'recorder', action: 'start', timeslice });
        const intervalMs = Math.max(20, Number(timeslice) || 100);
        this._chunkTimer = setInterval(() => {
          if (this.state !== 'recording') return;
          const blob = new Blob([new Uint8Array([1, 2, 3, 4, 5])], { type: this.mimeType });
          this._emit('dataavailable', { data: blob });
        }, intervalMs);
      }
      stop() {
        if (this._chunkTimer) {
          clearInterval(this._chunkTimer);
          this._chunkTimer = null;
        }
        this.state = 'inactive';
        window.__harnessLog.push({ type: 'recorder', action: 'stop' });
        const blob = new Blob([new Uint8Array([1, 2, 3, 4, 5])], { type: this.mimeType });
        setTimeout(() => {
          this._emit('dataavailable', { data: blob });
          this._emit('stop', {});
        }, 10);
      }
    };
  </script>
  <script type="module" src="../../internal/web/static/app.js"></script>
  <script>
    window.addEventListener('unhandledrejection', (ev) => {
      window.__harnessLog.push({ type: 'unhandled_rejection', message: String(ev.reason?.message || ev.reason) });
    });
  </script>
</body>
</html>
