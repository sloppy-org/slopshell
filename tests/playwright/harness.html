    // constructor" for Touch and rejects non-native Touch objects in
    // TouchEvent). All touch-based Playwright tests need this.
    (function() {
      var needsTouch = false;
      if (typeof Touch === 'undefined') {
        needsTouch = true;
      } else {
        try { new Touch({ identifier: 0, target: document.body }); } catch { needsTouch = true; }
      }
      if (needsTouch) {
        function TouchPolyfill(init) {
          this.identifier = init.identifier ?? 0;
          this.target = init.target ?? document.body;
          this.clientX = init.clientX ?? 0;
          this.clientY = init.clientY ?? 0;
          this.pageX = init.pageX ?? init.clientX ?? 0;
          this.pageY = init.pageY ?? init.clientY ?? 0;
          this.screenX = init.screenX ?? init.clientX ?? 0;
          this.screenY = init.screenY ?? init.clientY ?? 0;
          this.radiusX = init.radiusX ?? 0;
          this.radiusY = init.radiusY ?? 0;
          this.rotationAngle = init.rotationAngle ?? 0;
          this.force = init.force ?? 0;
        }
        Object.defineProperty(window, 'Touch', {
          value: TouchPolyfill, writable: true, configurable: true,
        });
      }
      var needsTouchEvent = typeof TouchEvent === 'undefined';
      if (!needsTouchEvent && needsTouch) {
        try {
          var t = new Touch({ identifier: 0, target: document.body });
          new TouchEvent('touchstart', { touches: [t], changedTouches: [t], bubbles: true });
        } catch { needsTouchEvent = true; }
      }
      if (needsTouchEvent) {
        function TouchEventPolyfill(type, init) {
          var ev = new Event(type, init);
          ev.touches = (init && init.touches) || [];
          ev.changedTouches = (init && init.changedTouches) || [];
          ev.targetTouches = (init && init.targetTouches) || [];
          return ev;
        }
        Object.defineProperty(window, 'TouchEvent', {
          value: TouchEventPolyfill, writable: true, configurable: true,
        });
      }
    })();

        return `# Review Comment Draft\n\n${title ? `Target: ${title}\n\n` : ''}${bullets}`;

    // Mock Silero VAD: interprets __vadDbFrames with adaptive noise floor.
    // Speech detection uses relative thresholding (2 dB above calibrated floor).
    const VAD_MOCK_FRAME_MS = 40;
    const VAD_MOCK_CALIBRATION_FRAMES = 8;
    const VAD_MOCK_SPEECH_OFFSET_DB = 2;
    const VAD_MOCK_SPEECH_START_FRAMES = 3;
    const VAD_MOCK_REDEMPTION_FRAMES = 8;
    window.__taburaVadMock = {
      init() { return true; },
      create(callbacks) {
        let running = false;
        let timer = null;
        let speechActive = false;
        let speechFrameCount = 0;
        let silenceAfterSpeechCount = 0;
        let calibrationSamples = [];
        let noiseFloorDb = null;
        return {
          start() {
            if (running) return;
            running = true;
            speechActive = false;
            speechFrameCount = 0;
            silenceAfterSpeechCount = 0;
            calibrationSamples = [];
            noiseFloorDb = null;
            timer = setInterval(() => {
              if (!running) return;
              const script = Array.isArray(window.__vadDbFrames) ? window.__vadDbFrames : [];
              const db = script.length > 0 ? Number(script.shift()) : -80;

              if (noiseFloorDb === null) {
                calibrationSamples.push(db);
                if (calibrationSamples.length >= VAD_MOCK_CALIBRATION_FRAMES) {
                  const sorted = calibrationSamples.slice().sort((a, b) => a - b);
                  noiseFloorDb = sorted[Math.floor(sorted.length * 0.35)] || -60;
                }
                return;
              }

              const speechThreshold = noiseFloorDb + VAD_MOCK_SPEECH_OFFSET_DB;
              const isSpeech = db > speechThreshold;

              if (!speechActive) {
                if (isSpeech) {
                  speechFrameCount += 1;
                  if (speechFrameCount >= VAD_MOCK_SPEECH_START_FRAMES) {
                    speechActive = true;
                    silenceAfterSpeechCount = 0;
                    if (callbacks.onSpeechStart) callbacks.onSpeechStart();
                  }
                } else {
                  speechFrameCount = 0;
                }
              } else {
                if (isSpeech) {
                  silenceAfterSpeechCount = 0;
                } else {
                  silenceAfterSpeechCount += 1;
                  if (silenceAfterSpeechCount >= VAD_MOCK_REDEMPTION_FRAMES) {
                    speechActive = false;
                    speechFrameCount = 0;
                    silenceAfterSpeechCount = 0;
                    if (callbacks.onSpeechEnd) callbacks.onSpeechEnd(new Float32Array(160));
                  }
                }
              }
            }, VAD_MOCK_FRAME_MS);
          },
          pause() {
            running = false;
            if (timer) { clearInterval(timer); timer = null; }
          },
          destroy() {
            running = false;
            if (timer) { clearInterval(timer); timer = null; }
          },
        };
      },
    };

              pr_title: `Harness PR ${prNumber}`,

      }
      if (u.includes('/api/chat/') && u.includes('/messages') && opts?.method === 'POST') {
        const signal = opts?.signal;
        if (messagePostDelayMs > 0) {

            const timer = window.setTimeout(() => {

      if (u.includes('/api/stt/transcribe') && opts?.method === 'POST') {
        let mimeType = '';
        let bytes = 0;
        const body = opts?.body;
        if (body && typeof body.get === 'function') {
          try {
            mimeType = String(body.get('mime_type') || '').trim();
          } catch (_) {}
          try {
            const file = body.get('file');
            bytes = Number(file?.size || 0);
            if (!mimeType) mimeType = String(file?.type || '').trim();
          } catch (_) {}
        }
        if (!mimeType) mimeType = 'application/octet-stream';
        window.__harnessLog.push({ type: 'api_fetch', action: 'stt_transcribe', mime_type: mimeType, bytes });
        const payload = sttTranscribePayload && typeof sttTranscribePayload === 'object'
          ? JSON.stringify(sttTranscribePayload)
          : '{}';
        return new Response(payload, {
          status: sttTranscribeStatus,
          headers: { 'Content-Type': 'application/json' },

      }
      if (u.includes('/api/chat/')) {
        return new Response(JSON.stringify({ messages: [], turns: [] }), { status: 200 });
      }
      if (u.includes('/api/assistant/')) {
        return new Response(JSON.stringify({ active: 0, queued: 0 }), { status: 200 });
      }
      if (u.includes('/api/runtime')) {
        return new Response(JSON.stringify({ ...runtimeState }), { status: 200 });
      }
      if (u.includes('/api/canvas/')) {
        return new Response(JSON.stringify({}), { status: 200 });
      }
      if (u.includes('/api/files/')) {
        const pathPart = u.split('/api/files/')[1] || '';
        const slash = pathPart.indexOf('/');
        const encodedPath = slash >= 0 ? pathPart.slice(slash + 1) : '';
        const filePath = decodeURIComponent(encodedPath || '').trim() || 'file';
        return new Response(`# Harness file: ${filePath}\n`, {
          status: 200,
          headers: { 'Content-Type': 'text/markdown; charset=utf-8' },

      }
      return _realFetch.apply(this, arguments);
    };

    // Mock WebSocket with STT message handling and chat events
    const _NativeWebSocket = window.WebSocket;
    class MockWebSocket {

      static OPEN = 1;
      static CLOSING = 2;
      static CLOSED = 3;

                }
              }, 5);
              return;
            }
            window.__harnessLog.push({ type: 'participant', action: 'start' });
            setTimeout(() => {
              if (ws.onmessage) {
                ws.onmessage({ data: JSON.stringify({ type: 'participant_started', session_id: 'psess-harness-001' }) });
              }
            }, 5);
          } else if (msg.type === 'participant_stop') {
            window.__harnessLog.push({ type: 'participant', action: 'stop' });
            const ws = this;
            setTimeout(() => {
              if (ws.onmessage) {

              }

            window.__harnessLog.push({ type: 'tts', text: msg.text, lang: msg.lang });
            const ws = this;
            // Return minimal WAV as binary ArrayBuffer
            const wavHeader = new Uint8Array([
              0x52,0x49,0x46,0x46, 0x24,0x00,0x00,0x00, 0x57,0x41,0x56,0x45,
              0x66,0x6D,0x74,0x20, 0x10,0x00,0x00,0x00, 0x01,0x00,0x01,0x00,
              0x44,0xAC,0x00,0x00, 0x88,0x58,0x01,0x00, 0x02,0x00,0x10,0x00,
              0x64,0x61,0x74,0x61, 0x00,0x00,0x00,0x00,
            ]);
            setTimeout(() => {
              if (ws.onmessage) {

              }
            }, 5);
          } else if (msg.type === 'canvas_position') {
            window.__harnessLog.push({
              type: 'canvas_position',
              gesture: msg.gesture,
              request_response: Boolean(msg.request_response),
              output_mode: msg.output_mode,
              cursor: msg.cursor || null,

      }
      close() { this.readyState = MockWebSocket.CLOSED; }

      injectEvent(payload) {

    }
    window.WebSocket = MockWebSocket;

    // Mock AudioContext for TTS playback and VAD analyser input.
    function fillTimeDomainForDb(target, db) {
      if (!(target instanceof Uint8Array)) return;
      const clampedDb = Number.isFinite(db) ? db : -20;
      if (clampedDb <= -95) {
        target.fill(128);
        return;
      }
      const amplitude = Math.max(1, Math.min(127, Math.round(128 * Math.pow(10, clampedDb / 20))));
      for (let i = 0; i < target.length; i += 1) {
        target[i] = (i % 2 === 0) ? 128 + amplitude : 128 - amplitude;
      }

    window.__setMediaRecorderChunkMimeType = (mimeType) => {

    window.__mediaRecorderChunkBytes = [1, 2, 3, 4, 5];
    window.__setMediaRecorderChunkBytes = (bytes) => {

          .map((n) => Number(n))
          .filter((n) => Number.isFinite(n))
          .map((n) => Math.max(0, Math.min(255, Math.trunc(n))));

      }
    };
    window.__mediaRecorderRequestDataEnabled = true;
    window.__setMediaRecorderRequestDataEnabled = (enabled) => {
      window.__mediaRecorderRequestDataEnabled = Boolean(enabled);
    };

    const MockAudioContext = class {
      constructor() {
        this.currentTime = 0;
        this.destination = {};
        this.state = 'running';
      }
      async resume() {
        this.state = 'running';
      }
      async decodeAudioData(buf) {
        const length = 4410;
        const channel = new Float32Array(length);
        for (let i = 0; i < length; i += 1) {
          const phase = (i / 44100) * 2 * Math.PI * 440;
          channel[i] = Math.sin(phase) * 0.1;
        }
        return {
          duration: 0.1,
          length,
          sampleRate: 44100,
          numberOfChannels: 1,
          getChannelData(index) {
            if (index !== 0) return new Float32Array(length);
            return channel;
          },
        };
      }
      createMediaStreamSource() {
        return {
          connect() {},
          disconnect() {},
        };
      }
      createGain() {
        return {
          gain: { value: 1 },
          connect() {},
          disconnect() {},
        };
      }
      createAnalyser() {
        return {
          fftSize: 1024,
          smoothingTimeConstant: 0,
          frequencyBinCount: 512,
          connect() {},
          disconnect() {},
          getByteTimeDomainData(target) {
            const script = Array.isArray(window.__vadDbFrames) ? window.__vadDbFrames : [];
            const nextDb = script.length > 0 ? Number(script.shift()) : -20;
            fillTimeDomainForDb(target, nextDb);

      }
      createBufferSource() {

          buffer: null,
          onended: null,
          connect() {},
          start() {

          },
          stop() {},
        };

      }
    };
    window.AudioContext = MockAudioContext;
    window.webkitAudioContext = MockAudioContext;

    // Mock getUserMedia
    let getUserMediaCallCount = 0;
    let currentMicTrack = null;
    let currentMicStream = null;

    function createMockMicTrack() {
      const track = new EventTarget();
      track.kind = 'audio';
      track.enabled = true;
      track.muted = false;
      track.readyState = 'live';

        if (track.readyState === 'ended') return;
        track.readyState = 'ended';
        track.dispatchEvent(new Event('ended'));
      };

    }

    function createMockMicStream() {
      const stream = new EventTarget();

        const cloned = createMockMicStream();
        return cloned.stream;
      };

        if (track.readyState !== 'ended') {
          track.readyState = 'ended';
          track.dispatchEvent(new Event('ended'));

    // Mock MediaRecorder
    window.MediaRecorder = class MockMediaRecorder {
      constructor() {

      start(timeslice) {

        window.__harnessLog.push({ type: 'recorder', action: 'start', timeslice });

        this._chunkTimer = setInterval(() => {
          if (this.state !== 'recording') return;
          const bytes = Array.isArray(window.__mediaRecorderChunkBytes)
            ? window.__mediaRecorderChunkBytes
            : [1, 2, 3, 4, 5];
          const chunkMime = typeof window.__mediaRecorderChunkMimeType === 'string'
            ? window.__mediaRecorderChunkMimeType
            : this.mimeType;

      stop() {

        window.__harnessLog.push({ type: 'recorder', action: 'stop' });

          setTimeout(() => {
            this._emit('stop', {});

        } else {
          const bytes = Array.isArray(window.__mediaRecorderChunkBytes)
            ? window.__mediaRecorderChunkBytes
            : [1, 2, 3, 4, 5];
          const chunkMime = typeof window.__mediaRecorderChunkMimeType === 'string'
            ? window.__mediaRecorderChunkMimeType
            : this.mimeType;
          const blob = new Blob([new Uint8Array(bytes)], chunkMime ? { type: chunkMime } : undefined);
          setTimeout(() => {
            this._emit('dataavailable', { data: blob });
            this._emit('stop', {});
          }, 10);
        }
      }
      requestData() {
        if (!window.__mediaRecorderRequestDataEnabled) return;
        window.__harnessLog.push({ type: 'recorder', action: 'requestData' });
        if (this.state !== 'recording') return;
        const bytes = Array.isArray(window.__mediaRecorderChunkBytes)
          ? window.__mediaRecorderChunkBytes
          : [1, 2, 3, 4, 5];
        const chunkMime = typeof window.__mediaRecorderChunkMimeType === 'string'
          ? window.__mediaRecorderChunkMimeType
          : this.mimeType;
        const blob = new Blob([new Uint8Array(bytes)], chunkMime ? { type: chunkMime } : undefined);
        this._emit('dataavailable', { data: blob });
      }
    };
