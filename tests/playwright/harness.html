<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabura Mail Harness</title>
  <link rel="stylesheet" href="../../internal/web/static/style.css">
  <style>
    body { margin: 0; padding: 0; }
    #harness-root { width: 100vw; height: 100vh; display: flex; }
    #panel-canvas { width: 100%; }
  </style>
</head>
<body>
  <div id="harness-root">
    <div id="panel-canvas" class="panel">
      <div id="canvas-header">
        <span id="canvas-title">Canvas</span>
        <span id="canvas-mode" class="badge">prompt</span>
      </div>
      <div id="canvas-content">
        <div id="canvas-empty">No artifact.</div>
        <div id="canvas-text" style="display:none"></div>
        <div id="canvas-image" style="display:none"><img id="canvas-img" alt="artifact"></div>
        <div id="canvas-pdf" style="display:none"></div>
      </div>
    </div>
  </div>

  <select id="canvas-mark-type" style="display:none">
    <option value="highlight">Highlight</option>
    <option value="underline">Underline</option>
    <option value="strikeout">Strikeout</option>
    <option value="squiggly">Squiggly</option>
    <option value="comment_point">Point Comment</option>
  </select>
  <input id="canvas-mark-comment" type="text" style="display:none">
  <button id="btn-canvas-commit" type="button" style="display:none">Commit</button>
  <button id="btn-canvas-clear-draft" type="button" style="display:none">Clear Draft</button>

  <script type="module">
    window.__TABURA_UNDO_TIMEOUT_MS = 80;
    const harnessMessages = [];
    const harnessState = {
      sessionId: 'local',
      canvasWs: {
        readyState: WebSocket.OPEN,
        send(payload) {
          try {
            harnessMessages.push(JSON.parse(payload));
          } catch (_) {
            harnessMessages.push({ raw: String(payload || '') });
          }
        },
      },
    };

    const sttLog = [];
    let sttTranscript = 'hello world';
    let sttFailStop = false;
    window._taburaApp = {
      getState() {
        return harnessState;
      },
      sttStart(mimeType) {
        sttLog.push({ action: 'start', mime_type: mimeType });
      },
      sttSendChunk(blob) {
        sttLog.push({ action: 'append', size: blob?.size || 0 });
      },
      sttStop() {
        sttLog.push({ action: 'stop' });
        if (sttFailStop) {
          return Promise.reject(new Error('upstream unavailable'));
        }
        return Promise.resolve({ text: sttTranscript });
      },
      sttCancel() {
        sttLog.push({ action: 'cancel' });
      },
    };
    window.__sttLog = sttLog;
    window.__sttConfigure = (transcript, failStop) => {
      sttTranscript = transcript;
      sttFailStop = failStop;
    };

    const { renderCanvas, clearCanvas, initCanvasControls } = await import('../../internal/web/static/canvas.js');
    initCanvasControls();
    window.renderHarnessArtifact = (event) => renderCanvas(event);
    window.clearHarnessCanvas = () => clearCanvas();
    window.getHarnessMessages = () => harnessMessages.slice();
    window.clearHarnessMessages = () => {
      harnessMessages.splice(0, harnessMessages.length);
    };
  </script>
</body>
</html>
