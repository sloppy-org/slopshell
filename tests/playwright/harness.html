<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabura Harness</title>
  <link rel="stylesheet" href="../../internal/web/static/style.css">
  <style>
    body { margin: 0; padding: 0; }
  </style>
</head>
<body>
  <div id="app">
    <div id="view-main" class="view">

      <div id="workspace">
        <aside id="pr-file-pane" aria-label="File sidebar">
          <div id="pr-file-list" class="pr-file-list"></div>
        </aside>
        <div id="canvas-column">
          <div id="pr-file-drawer-backdrop" aria-hidden="true"></div>
          <div id="canvas-viewport">
            <section id="canvas-text" class="canvas-pane" aria-label="Text artifact"></section>
            <section id="canvas-image" class="canvas-pane" aria-label="Image artifact"><img id="canvas-img" alt="artifact"></section>
            <section id="canvas-pdf" class="canvas-pane" aria-label="PDF artifact"></section>
            <svg id="ink-layer" class="ink-layer" aria-hidden="true"></svg>
          </div>
          <div id="ink-controls" class="ink-controls" style="display:none">
            <button id="ink-clear" type="button" class="edge-btn">Clear Ink</button>
            <button id="ink-submit" type="button" class="edge-btn">Submit Ink</button>
          </div>
        </div>
      </div>

      <section id="companion-idle-surface" class="companion-idle-surface" aria-hidden="true">
        <div class="companion-idle-shell">
          <div class="companion-idle-frame">
            <div class="companion-idle-face" aria-hidden="true">
              <div class="companion-idle-brow companion-idle-brow-left"></div>
              <div class="companion-idle-brow companion-idle-brow-right"></div>
              <div class="companion-idle-eye companion-idle-eye-left"><span class="companion-idle-pupil"></span></div>
              <div class="companion-idle-eye companion-idle-eye-right"><span class="companion-idle-pupil"></span></div>
              <div class="companion-idle-mouth"></div>
            </div>
            <div class="companion-idle-copy">
              <div class="companion-idle-kicker">Companion</div>
              <div class="companion-idle-status" aria-live="polite">Idle</div>
              <div class="companion-idle-detail">Ready in the background.</div>
            </div>
          </div>
        </div>
      </section>

      <div id="indicator" class="indicator" style="display:none">
        <span class="record-dot"></span>
        <span class="stop-square"></span>
        <span class="pause-bars"></span>
      </div>

      <textarea id="floating-input" class="floating-input" style="display:none" rows="1" placeholder=""></textarea>

      <div id="overlay" class="overlay" style="display:none">
        <div class="overlay-content"></div>
      </div>

      <button id="edge-left-tap" type="button" class="edge-left-tap" aria-label="Toggle file sidebar"></button>
      <button id="edge-right-tap" type="button" class="edge-right-tap" aria-label="Open chat panel"></button>

      <div id="edge-top" class="edge-panel edge-top">
        <div class="edge-panel-inner">
          <div class="edge-panel-head">
            <span class="edge-panel-title">Projects</span>
            <button id="btn-edge-rasa" type="button" class="edge-btn">Tabula Rasa</button>
          </div>
          <div id="edge-top-models" aria-label="Project chat model"></div>
          <div id="edge-top-projects"></div>
        </div>
      </div>

      <div id="edge-right" class="edge-panel edge-right">
        <div class="edge-panel-inner">
          <div class="edge-panel-head">
            <span class="edge-panel-title">Log</span>
            <span id="status-label" class="status-label"></span>
          </div>
          <div id="chat-history" aria-live="polite"></div>
          <div class="chat-pane-input-row">
            <textarea id="chat-pane-input" rows="1" placeholder="Message..."></textarea>
          </div>
        </div>
      </div>

      <div id="toolbar" style="display:none">
        <div id="project-tab-strip" role="tablist" aria-label="Projects"></div>
        <span id="status-text">ready</span>
        <span id="chat-mode-pill" class="badge">chat</span>
      </div>
      <section id="project-overview" class="project-overview is-hidden" style="display:none">
        <div id="project-cards" class="project-cards"></div>
        <form id="project-create-form" autocomplete="off" style="display:none"></form>
      </section>

    </div>
  </div>

  <script>
    // Touch + TouchEvent polyfill for WebKit headless (throws "Illegal
    // constructor" for Touch and rejects non-native Touch objects in
    // TouchEvent). All touch-based Playwright tests need this.
    (function() {
      var needsTouch = false;
      if (typeof Touch === 'undefined') {
        needsTouch = true;
      } else {
        try { new Touch({ identifier: 0, target: document.body }); } catch { needsTouch = true; }
      }
      if (needsTouch) {
        function TouchPolyfill(init) {
          this.identifier = init.identifier ?? 0;
          this.target = init.target ?? document.body;
          this.clientX = init.clientX ?? 0;
          this.clientY = init.clientY ?? 0;
          this.pageX = init.pageX ?? init.clientX ?? 0;
          this.pageY = init.pageY ?? init.clientY ?? 0;
          this.screenX = init.screenX ?? init.clientX ?? 0;
          this.screenY = init.screenY ?? init.clientY ?? 0;
          this.radiusX = init.radiusX ?? 0;
          this.radiusY = init.radiusY ?? 0;
          this.rotationAngle = init.rotationAngle ?? 0;
          this.force = init.force ?? 0;
        }
        Object.defineProperty(window, 'Touch', {
          value: TouchPolyfill, writable: true, configurable: true,
        });
      }
      var needsTouchEvent = typeof TouchEvent === 'undefined';
      if (!needsTouchEvent && needsTouch) {
        try {
          var t = new Touch({ identifier: 0, target: document.body });
          new TouchEvent('touchstart', { touches: [t], changedTouches: [t], bubbles: true });
        } catch { needsTouchEvent = true; }
      }
      if (needsTouchEvent) {
        function TouchEventPolyfill(type, init) {
          var ev = new Event(type, init);
          ev.touches = (init && init.touches) || [];
          ev.changedTouches = (init && init.changedTouches) || [];
          ev.targetTouches = (init && init.targetTouches) || [];
          return ev;
        }
        Object.defineProperty(window, 'TouchEvent', {
          value: TouchEventPolyfill, writable: true, configurable: true,
        });
      }
    })();

    // Harness log for test assertions
    window.__harnessLog = [];
    const DEFAULT_CANCEL_RESPONSE = { ok: true, canceled: 2, active_canceled: 1, queued_canceled: 1 };
    let cancelResponsesQueue = [];
    let activityResponse = { ok: true, active_turns: 0, queued_turns: 0 };
    let messagePostDelayMs = 0;
    let sttTranscribeStatus = 200;
    let sttTranscribePayload = { text: 'hello world' };
    window.__setCancelResponses = (responses) => {
      cancelResponsesQueue = Array.isArray(responses) ? responses.map((entry) => ({ ...entry })) : [];
    };
    window.__setActivityResponse = (response) => {
      activityResponse = {
        ok: true,
        active_turns: Number(response?.active_turns || 0),
        queued_turns: Number(response?.queued_turns || 0),
      };
    };
    window.__setMessagePostDelay = (ms) => {
      const n = Number(ms);
      messagePostDelayMs = Number.isFinite(n) && n > 0 ? Math.floor(n) : 0;
    };
    window.__setSTTTranscribeResponse = (payload, status = 200) => {
      sttTranscribePayload = payload && typeof payload === 'object' ? { ...payload } : {};
      const n = Number(status);
      sttTranscribeStatus = Number.isFinite(n) ? Math.max(100, Math.min(599, Math.floor(n))) : 200;
    };
    window.__setCancelResponses([]);
    window.__setActivityResponse({ active_turns: 0, queued_turns: 0 });
    window.__setMessagePostDelay(0);
    window.__setSTTTranscribeResponse({ text: 'hello world' }, 200);
    const harnessParams = new URL(window.location.href).searchParams;
    const runtimeState = {
      dev_mode: false,
      boot_id: 'test',
      tts_enabled: true,
      silent_mode: false,
      input_mode: 'pen',
      startup_behavior: 'hub_first',
    };
    window.__setRuntimeState = (patch) => {
      const next = patch && typeof patch === 'object' ? patch : {};
      if (Object.prototype.hasOwnProperty.call(next, 'silent_mode')) {
        runtimeState.silent_mode = Boolean(next.silent_mode);
      }
      if (Object.prototype.hasOwnProperty.call(next, 'input_mode')) {
        const normalized = String(next.input_mode || '').trim().toLowerCase();
        runtimeState.input_mode = normalized === 'voice'
          ? 'voice'
          : (normalized === 'keyboard' || normalized === 'typing' ? 'keyboard' : 'pen');
      }
      if (Object.prototype.hasOwnProperty.call(next, 'startup_behavior')) {
        runtimeState.startup_behavior = 'hub_first';
      }
    };
    window.__getRuntimeState = () => ({ ...runtimeState });
    let hotwordInitEnabled = harnessParams.get('hotword') !== 'fail';
    const safariRecorderBroken = harnessParams.get('safari-recorder') === 'broken';
    let ttsPlaybackDelayMs = 10;
    let hotwordStatus = {
      ok: true,
      ready: true,
      missing: [],
    };
    window.__setHotwordStatus = (next) => {
      const incoming = next && typeof next === 'object' ? next : {};
      hotwordStatus = { ...hotwordStatus, ...incoming };
      if (!Array.isArray(hotwordStatus.missing)) {
        hotwordStatus.missing = [];
      }
      hotwordStatus.ready = Boolean(hotwordStatus.ready);
    };
    window.__setHotwordInitEnabled = (enabled) => {
      hotwordInitEnabled = Boolean(enabled);
    };
    window.__setTTSPlaybackDelayMs = (ms) => {
      const n = Number(ms);
      ttsPlaybackDelayMs = Number.isFinite(n) && n >= 0 ? Math.floor(n) : 10;
    };
    window.__setTTSPlaybackDelayMs(10);
    window.__taburaHotwordMock = {
      active: false,
      onDetect: null,
      threshold: 0.5,
      init() {
        window.__harnessLog.push({ type: 'hotword', action: 'init', enabled: hotwordInitEnabled });
        return hotwordInitEnabled;
      },
      start(_stream, onDetect) {
        this.active = true;
        this.onDetect = typeof onDetect === 'function' ? onDetect : null;
        window.__harnessLog.push({ type: 'hotword', action: 'start' });
      },
      stop() {
        if (this.active) {
          window.__harnessLog.push({ type: 'hotword', action: 'stop' });
        }
        this.active = false;
        this.onDetect = null;
      },
      setThreshold(value) {
        this.threshold = Number(value);
        window.__harnessLog.push({ type: 'hotword', action: 'threshold', value: this.threshold });
      },
      trigger() {
        if (!this.active || typeof this.onDetect !== 'function') return;
        window.__harnessLog.push({ type: 'hotword', action: 'detect' });
        this.onDetect();
      },
    };
    window.__triggerHotwordDetection = () => {
      if (window.__taburaHotwordMock) {
        window.__taburaHotwordMock.trigger();
      }
    };
    window.__isHotwordActive = () => Boolean(window.__taburaHotwordMock?.active);

    // Mock Silero VAD: interprets __vadDbFrames with adaptive noise floor.
    // Speech detection uses relative thresholding (2 dB above calibrated floor).
    const VAD_MOCK_FRAME_MS = 40;
    const VAD_MOCK_CALIBRATION_FRAMES = 8;
    const VAD_MOCK_SPEECH_OFFSET_DB = 2;
    const VAD_MOCK_SPEECH_START_FRAMES = 3;
    const VAD_MOCK_REDEMPTION_FRAMES = 8;
    window.__taburaVadMock = {
      init() { return true; },
      create(callbacks) {
        let running = false;
        let timer = null;
        let speechActive = false;
        let speechFrameCount = 0;
        let silenceAfterSpeechCount = 0;
        let calibrationSamples = [];
        let noiseFloorDb = null;
        return {
          start() {
            if (running) return;
            running = true;
            speechActive = false;
            speechFrameCount = 0;
            silenceAfterSpeechCount = 0;
            calibrationSamples = [];
            noiseFloorDb = null;
            timer = setInterval(() => {
              if (!running) return;
              const script = Array.isArray(window.__vadDbFrames) ? window.__vadDbFrames : [];
              const db = script.length > 0 ? Number(script.shift()) : -80;

              if (noiseFloorDb === null) {
                calibrationSamples.push(db);
                if (calibrationSamples.length >= VAD_MOCK_CALIBRATION_FRAMES) {
                  const sorted = calibrationSamples.slice().sort((a, b) => a - b);
                  noiseFloorDb = sorted[Math.floor(sorted.length * 0.35)] || -60;
                }
                return;
              }

              const speechThreshold = noiseFloorDb + VAD_MOCK_SPEECH_OFFSET_DB;
              const isSpeech = db > speechThreshold;

              if (!speechActive) {
                if (isSpeech) {
                  speechFrameCount += 1;
                  if (speechFrameCount >= VAD_MOCK_SPEECH_START_FRAMES) {
                    speechActive = true;
                    silenceAfterSpeechCount = 0;
                    if (callbacks.onSpeechStart) callbacks.onSpeechStart();
                  }
                } else {
                  speechFrameCount = 0;
                }
              } else {
                if (isSpeech) {
                  silenceAfterSpeechCount = 0;
                } else {
                  silenceAfterSpeechCount += 1;
                  if (silenceAfterSpeechCount >= VAD_MOCK_REDEMPTION_FRAMES) {
                    speechActive = false;
                    speechFrameCount = 0;
                    silenceAfterSpeechCount = 0;
                    if (callbacks.onSpeechEnd) callbacks.onSpeechEnd(new Float32Array(160));
                  }
                }
              }
            }, VAD_MOCK_FRAME_MS);
          },
          pause() {
            running = false;
            if (timer) { clearInterval(timer); timer = null; }
          },
          destroy() {
            running = false;
            if (timer) { clearInterval(timer); timer = null; }
          },
        };
      },
    };

    window.__injectParticipantSegment = (segment) => {
      const sessions = window.__mockWsSessions || [];
      const chatWs = sessions.find((ws) => typeof ws.url === 'string' && ws.url.includes('/ws/chat/'));
      if (chatWs?.onmessage) {
        chatWs.onmessage({ data: JSON.stringify({
          type: 'participant_segment_text',
          session_id: segment?.session_id || 'psess-harness-001',
          text: segment?.text || 'test segment',
          segment_id: segment?.segment_id || 1,
          start_ts: segment?.start_ts || Math.floor(Date.now() / 1000),
          end_ts: segment?.end_ts || Math.floor(Date.now() / 1000),
          latency_ms: segment?.latency_ms || 100,
        }) });
      }
    };

    const harnessProjects = [
      {
        id: 'test',
        name: 'Test',
        kind: 'managed',
        project_key: '/tmp/test',
        root_path: '/tmp',
        chat_session_id: 'chat-1',
        canvas_session_id: 'local',
        chat_mode: 'chat',
        chat_model: 'spark',
        chat_model_reasoning_effort: 'low',
        unread: false,
        review_pending: false,
        run_state: { active_turns: 0, queued_turns: 0, is_working: false, status: 'idle' },
      },
      {
        id: 'hub',
        name: 'Hub',
        kind: 'hub',
        project_key: '__hub__',
        root_path: '/tmp/hub',
        chat_session_id: 'chat-hub',
        canvas_session_id: 'local',
        chat_mode: 'chat',
        chat_model: 'spark',
        chat_model_reasoning_effort: 'low',
        unread: false,
        review_pending: false,
        run_state: { active_turns: 0, queued_turns: 0, is_working: false, status: 'idle' },
      },
    ];
    let activeProjectId = 'test';
    let harnessProjectRunStates = {
      test: { active_turns: 0, queued_turns: 0, is_working: false, status: 'idle' },
      hub: { active_turns: 0, queued_turns: 0, is_working: false, status: 'idle' },
    };
    window.__participantConfig = {
      companion_enabled: false,
      language: 'en',
      max_segment_duration_ms: 30000,
      session_ram_cap_mb: 64,
      stt_model: 'whisper-1',
      idle_surface: 'robot',
      audio_persistence: 'none',
      capture_source: 'microphone',
    };
    window.__companionRuntimeState = {
      state: 'idle',
      reason: 'idle',
      project_key: '/tmp/test',
      updated_at: Math.floor(Date.now() / 1000),
    };
    window.__setProjectRunStates = (states) => {
      const next = states && typeof states === 'object' ? states : {};
      harnessProjectRunStates = {
        ...harnessProjectRunStates,
        ...next,
      };
    };
    window.__setProjectActivity = (states) => {
      const next = states && typeof states === 'object' ? states : {};
      for (const [projectId, patch] of Object.entries(next)) {
        const index = harnessProjects.findIndex((project) => project.id === projectId);
        if (index < 0 || !patch || typeof patch !== 'object') continue;
        harnessProjects[index] = {
          ...harnessProjects[index],
          ...patch,
          unread: Boolean(patch.unread ?? harnessProjects[index].unread),
          review_pending: Boolean(patch.review_pending ?? harnessProjects[index].review_pending),
          chat_mode: String(patch.chat_mode || harnessProjects[index].chat_mode || 'chat'),
        };
      }
    };
    const cloneProject = (id) => {
      const project = harnessProjects.find((item) => item.id === id) || harnessProjects[0];
      return {
        ...project,
        run_state: { ...(harnessProjectRunStates[project.id] || project.run_state || {}) },
      };
    };
    const nextHarnessProjectId = (kind) => {
      const cleanKind = String(kind || 'project').trim().toLowerCase() || 'project';
      let suffix = 1;
      while (harnessProjects.some((project) => project.id === `${cleanKind}-${suffix}`)) {
        suffix += 1;
      }
      return `${cleanKind}-${suffix}`;
    };

    // Mock fetch for /api/setup etc.
    const _realFetch = window.fetch;
    window.fetch = async function(url, opts) {
      const u = String(url);
      if (u.includes('/api/setup')) {
        return new Response(JSON.stringify({
          has_password: true,
          authenticated: true,
          local_session: 'local',
        }), { status: 200 });
      }
      if (u.includes('/api/runtime/preferences') && opts?.method === 'PATCH') {
        let body = {};
        try { body = JSON.parse(String(opts?.body || '{}')); } catch (_) { body = {}; }
        if (Object.prototype.hasOwnProperty.call(body, 'silent_mode')) {
          runtimeState.silent_mode = Boolean(body.silent_mode);
        }
        if (typeof body?.input_mode === 'string') {
          const normalized = String(body.input_mode).trim().toLowerCase();
          runtimeState.input_mode = normalized === 'voice'
            ? 'voice'
            : (normalized === 'keyboard' || normalized === 'typing' ? 'keyboard' : 'pen');
        }
        if (typeof body?.startup_behavior === 'string') {
          runtimeState.startup_behavior = 'hub_first';
        }
        window.__harnessLog.push({
          type: 'api_fetch',
          action: 'runtime_preferences',
          method: opts?.method || 'PATCH',
          url: u,
          payload: { ...runtimeState },
        });
        return new Response(JSON.stringify({
          ok: true,
          silent_mode: runtimeState.silent_mode,
          input_mode: runtimeState.input_mode,
          startup_behavior: runtimeState.startup_behavior,
        }), { status: 200 });
      }
      if (u.endsWith('/api/projects') && opts?.method === 'POST') {
        let body = {};
        try {
          body = JSON.parse(String(opts?.body || '{}'));
        } catch (_) {
          body = {};
        }
        const kind = String(body?.kind || 'managed').trim().toLowerCase();
        const id = nextHarnessProjectId(kind);
        const label = kind === 'meeting' ? 'Meeting' : (kind === 'task' ? 'Task' : 'Project');
        const project = {
          id,
          name: `${label} ${id.split('-').pop()}`,
          kind,
          project_key: `/tmp/${id}`,
          root_path: `/tmp/${id}`,
          chat_session_id: `chat-${id}`,
          canvas_session_id: id,
          chat_mode: 'chat',
          chat_model: 'spark',
          chat_model_reasoning_effort: 'low',
          unread: false,
          review_pending: false,
          run_state: { active_turns: 0, queued_turns: 0, is_working: false, status: 'idle' },
        };
        harnessProjects.push(project);
        harnessProjectRunStates[id] = { ...project.run_state };
        if (Boolean(body?.activate)) {
          activeProjectId = id;
        }
        window.__harnessLog.push({
          type: 'api_fetch',
          action: 'project_create',
          method: opts?.method || 'POST',
          url: u,
          payload: { kind, project_id: id, source_project_id: String(body?.source_project_id || '').trim() },
        });
        return new Response(JSON.stringify({
          ok: true,
          created: true,
          activated: Boolean(body?.activate),
          project: cloneProject(id),
        }), { status: 200 });
      }
      if (u.includes('/api/projects') && u.includes('/activate')) {
        const activateId = decodeURIComponent(u.split('/api/projects/')[1].split('/activate')[0] || '').trim();
        const index = harnessProjects.findIndex((project) => project.id === activateId);
        if (index < 0) {
          return new Response('project not found', { status: 404 });
        }
        activeProjectId = harnessProjects[index].id;
        if (!(harnessProjects[index].review_pending && harnessProjects[index].chat_mode === 'review')) {
          harnessProjects[index] = {
            ...harnessProjects[index],
            unread: false,
          };
        }
        const project = cloneProject(activateId);
        window.__harnessLog.push({
          type: 'api_fetch',
          action: 'project_activate',
          method: opts?.method || 'POST',
          url: u,
          payload: { project_id: project.id },
        });
        return new Response(JSON.stringify({
          project,
        }), { status: 200 });
      }
      if (u.includes('/api/projects/') && u.includes('/persist') && opts?.method === 'POST') {
        const projectId = decodeURIComponent(u.split('/api/projects/')[1].split('/persist')[0] || '').trim();
        const index = harnessProjects.findIndex((project) => project.id === projectId);
        if (index < 0) {
          return new Response('project not found', { status: 404 });
        }
        harnessProjects[index] = {
          ...harnessProjects[index],
          kind: 'managed',
        };
        window.__harnessLog.push({
          type: 'api_fetch',
          action: 'project_persist',
          method: opts?.method || 'POST',
          url: u,
          payload: { project_id: projectId },
        });
        return new Response(JSON.stringify({
          ok: true,
          project: cloneProject(projectId),
        }), { status: 200 });
      }
      if (u.includes('/api/projects/') && u.includes('/discard') && opts?.method === 'POST') {
        const projectId = decodeURIComponent(u.split('/api/projects/')[1].split('/discard')[0] || '').trim();
        const index = harnessProjects.findIndex((project) => project.id === projectId);
        if (index < 0) {
          return new Response('project not found', { status: 404 });
        }
        harnessProjects.splice(index, 1);
        delete harnessProjectRunStates[projectId];
        activeProjectId = harnessProjects.some((project) => project.id === 'hub') ? 'hub' : (harnessProjects[0]?.id || '');
        window.__harnessLog.push({
          type: 'api_fetch',
          action: 'project_discard',
          method: opts?.method || 'POST',
          url: u,
          payload: { project_id: projectId, active_project_id: activeProjectId },
        });
        return new Response(JSON.stringify({
          ok: true,
          discarded_project: projectId,
          active_project_id: activeProjectId,
          active_project: cloneProject(activeProjectId),
        }), { status: 200 });
      }
      if (u.includes('/api/hotword/status')) {
        return new Response(JSON.stringify({
          ...hotwordStatus,
        }), { status: 200 });
      }
      if (u.includes('/api/projects') && u.includes('/chat-model') && opts?.method === 'POST') {
        const projectId = decodeURIComponent(u.split('/api/projects/')[1].split('/chat-model')[0] || '').trim();
        const index = harnessProjects.findIndex((project) => project.id === projectId);
        if (index < 0) {
          return new Response('project not found', { status: 404 });
        }
        let body = {};
        try {
          body = JSON.parse(String(opts?.body || '{}'));
        } catch (_) {
          body = {};
        }
        const model = String(body?.model || harnessProjects[index].chat_model || 'spark').trim().toLowerCase();
        let effort = String(body?.reasoning_effort || harnessProjects[index].chat_model_reasoning_effort || 'low').trim().toLowerCase();
        if (effort === 'extra_high') effort = 'xhigh';

      const clampedDb = Number.isFinite(db) ? db : -20;
      if (clampedDb <= -95) {
        target.fill(128);
        return;
      }
      const amplitude = Math.max(1, Math.min(127, Math.round(128 * Math.pow(10, clampedDb / 20))));
      for (let i = 0; i < target.length; i += 1) {
        target[i] = (i % 2 === 0) ? 128 + amplitude : 128 - amplitude;
      }
