<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabula</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <div id="view-main" class="view">
      <header id="toolbar">
        <span class="brand">Tabula</span>
        <span id="status-text">starting...</span>
        <span id="chat-mode-pill" class="badge">chat</span>
        <div class="toolbar-spacer"></div>
        <div id="main-tabs" role="tablist" aria-label="Primary views">
          <button id="tab-chat" class="tab-btn is-active" type="button" role="tab" aria-selected="true">Chat</button>
          <button id="tab-canvas" class="tab-btn" type="button" role="tab" aria-selected="false">
            Canvas
            <span id="tab-canvas-indicator" class="tab-indicator" style="display:none" aria-hidden="true"></span>
          </button>
        </div>
      </header>

      <div id="workspace" class="workspace-chat">
        <section id="panel-chat" class="panel" aria-label="Chat canvas">
          <div id="chat-history" aria-live="polite"></div>
          <form id="chat-form" autocomplete="off">
            <div id="chat-action-row">
              <button type="button" id="btn-plan-toggle">/plan</button>
              <button type="button" id="btn-open-canvas">Open Canvas</button>
              <button type="button" id="btn-commit-from-chat">Commit Draft</button>
            </div>
            <textarea id="chat-input" rows="1" placeholder="Ask Tabula anything. Use /plan for planning mode."></textarea>
            <div class="chat-compose-row">
              <span id="chat-hint">Enter sends. Shift+Enter inserts newline.</span>
              <button id="btn-chat-send" type="submit">Send</button>
            </div>
          </form>
        </section>

        <section id="panel-canvas" class="panel" aria-label="Review canvas">
          <div id="canvas-header">
            <span id="canvas-title">Canvas</span>
            <span id="canvas-mode" class="badge">prompt</span>
            <div class="canvas-annot-controls">
              <label for="canvas-mark-type" class="sr-only">Mark type</label>
              <select id="canvas-mark-type">
                <option value="highlight">Highlight</option>
                <option value="underline">Underline</option>
                <option value="strikeout">Strikeout</option>
                <option value="squiggly">Squiggly</option>
                <option value="comment_point">Point Comment</option>
              </select>
              <input id="canvas-mark-comment" type="text" placeholder="Comment (optional)">
              <button id="btn-canvas-commit" type="button">Commit</button>
              <button id="btn-canvas-clear-draft" type="button">Clear Draft</button>
            </div>
          </div>
          <div id="canvas-content">
            <div id="canvas-empty">No artifact. Ask in chat, then open Canvas when needed.</div>
            <div id="canvas-text" style="display:none"></div>
            <div id="canvas-image" style="display:none"><img id="canvas-img" alt="artifact"></div>
            <div id="canvas-pdf" style="display:none"></div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script src="/static/vendor/mathjax-config.js"></script>
  <script defer src="/static/vendor/mathjax/tex-svg.js"></script>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
